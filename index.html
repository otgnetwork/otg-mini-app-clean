<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>OTG Media Network</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">OTG</div>
        <div class="brand-text">
          <h1>OTG Media Network</h1>
          <p>Your music space inside Telegram</p>
        </div>
      </div>
    </header>

    <main class="app-main">

      <!-- HOME -->
      <section class="screen active" id="homeScreen">
        <div class="hero-card">
          <div class="hero-logo">OTG</div>
          <h2>OTG Network Media</h2>
          <p>Музыка, клипы и персональные песни — в одном пространстве.</p>
        </div>

        <div class="menu-grid">
          <button class="menu-card" id="openMusicBtn">
            🎵 Найти музыку
          </button>

          <button class="menu-card" id="openClipsBtn">
            🎬 Найти клипы
          </button>

          <button class="menu-card" id="openSongBtn">
            ✨ Заказать песню
          </button>

          <button class="menu-card" id="openLiveBtn">
            🔴 Live
          </button>
        </div>
      </section>

      <!-- MUSIC -->
      <section class="screen" id="musicScreen">
        <button id="backFromMusic">← Назад</button>

        <h2>Найти музыку</h2>

        <form id="musicSearchForm">
          <input id="musicQuery" placeholder="Eminem" />
          <button type="submit">Искать</button>
        </form>

        <div id="musicStatus"></div>
        <div id="musicResults"></div>
      </section>

      <!-- CLIPS -->
      <section class="screen" id="clipsScreen">
        <button id="backFromClips">← Назад</button>

        <h2>Найти клипы</h2>

        <form id="clipsSearchForm">
          <input id="clipsQuery" placeholder="Eminem Lose Yourself" />
          <button type="submit">Искать</button>
        </form>

        <div id="clipsStatus"></div>
        <div id="clipsResults"></div>
      </section>

      <!-- SONG -->
      <section class="screen" id="songScreen">
        <button id="backFromSong">← Назад</button>

        <h2>Заказать песню</h2>

        <button id="openMainBotBtn">
          Открыть @otgmusicbot
        </button>
      </section>

    </main>
  </div>

  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <script src="app.js"></script>
</body>
</html>
